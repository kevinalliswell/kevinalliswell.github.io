name: AI Digest

on:
  schedule:
    - cron: "15 1 * * *"
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: ai-digest
  cancel-in-progress: false

defaults:
  run:
    shell: bash

jobs:
  publish:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    env:
      TZ: Asia/Shanghai
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
      HUGO_VERSION: 0.157.0
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Compute publish date
        id: vars
        run: echo "publish_date=$(TZ=Asia/Shanghai date +%F)" >> "$GITHUB_OUTPUT"

      - name: Generate digest post
        run: |
          python3 scripts/generate_ai_digest.py \
            "${{ steps.vars.outputs.publish_date }}" \
            "content/posts/news/ai-digest-${{ steps.vars.outputs.publish_date }}.md"

      - name: Commit digest post
        id: commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add "content/posts/news/ai-digest-${{ steps.vars.outputs.publish_date }}.md"
          git add "data/ai_digest_sources.json"
          git add "scripts/generate_ai_digest.py"
          if git diff --cached --quiet; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          git commit -m "feat: publish AI digest for ${{ steps.vars.outputs.publish_date }}"
          git push
          echo "changed=true" >> "$GITHUB_OUTPUT"

      - name: Install Hugo CLI
        if: steps.commit.outputs.changed == 'true'
        run: |
          wget -O ${{ runner.temp }}/hugo.deb https://github.com/gohugoio/hugo/releases/download/v${HUGO_VERSION}/hugo_extended_${HUGO_VERSION}_linux-amd64.deb
          sudo dpkg -i ${{ runner.temp }}/hugo.deb

      - name: Install Dart Sass
        if: steps.commit.outputs.changed == 'true'
        run: sudo snap install dart-sass

      - name: Setup Pages
        if: steps.commit.outputs.changed == 'true'
        id: pages
        uses: actions/configure-pages@v5

      - name: Install Node.js dependencies
        if: steps.commit.outputs.changed == 'true'
        run: "[[ -f package-lock.json || -f npm-shrinkwrap.json ]] && npm ci || true"

      - name: Build with Hugo
        if: steps.commit.outputs.changed == 'true'
        env:
          HUGO_CACHEDIR: ${{ runner.temp }}/hugo_cache
          HUGO_ENVIRONMENT: production
          TZ: Asia/Shanghai
        run: |
          hugo \
            --gc \
            --minify \
            --baseURL "${{ steps.pages.outputs.base_url }}/"

      - name: Upload artifact
        if: steps.commit.outputs.changed == 'true'
        uses: actions/upload-pages-artifact@v4
        with:
          path: ./public

      - name: Deploy to GitHub Pages
        if: steps.commit.outputs.changed == 'true'
        id: deployment
        uses: actions/deploy-pages@v4
