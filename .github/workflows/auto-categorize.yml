name: Auto-categorize posts

on:
  push:
    branches:
      - main
    paths:
      - 'content/posts/**/*.md'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  categorize:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run auto-categorize
        id: categorize
        run: |
          python scripts/auto_categorize.py || echo "has_changes=true" >> "$GITHUB_OUTPUT"

      - name: Commit and push
        if: steps.categorize.outputs.has_changes == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add content/posts/
          git commit -m "chore: auto-categorize new posts"
          git push
