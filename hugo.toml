baseURL = 'https://kevinalliswell.github.io/'
languageCode = 'zh-cn'
title = "Kevin's Blog"
theme = 'PaperMod'

# 默认设置
defaultContentLanguage = "zh"
hasCJKLanguage = true

# 分页设置 (Hugo v0.128.0+)
[pagination]
  pagerSize = 10


# 导航菜单
[menu]
  [[menu.main]]
    identifier = "posts"
    name = "文章"
    url = "/posts/"
    weight = 10
  [[menu.main]]
    identifier = "archives"
    name = "归档"
    url = "/archives/"
    weight = 20
  [[menu.main]]
    identifier = "about"
    name = "关于"
    url = "/about/"
    weight = 30

[params]
  # 作者信息
  author = "Kevin"
  # 主题设置
  defaultTheme = "auto"
  ShowReadingTime = true
  ShowShareButtons = false
  ShowPostNavLinks = true
  ShowBreadCrumbs = true
  ShowCodeCopyButtons = true
  
  # 首页设置
  [params.homeInfoParams]
    Title = "你好，我是 Kevin 👋"
    Content = """
    这里是我的数字花园，记录：
    
    📝 **工作笔记** - 技术学习、项目总结
    🌟 **热点观察** - AI、科技趋势分析  
    📸 **生活随笔** - 日常思考、读书笔记
    
    欢迎订阅 RSS 或通过邮件交流。
    """

  # 社交链接
  [[params.socialIcons]]
    name = "github"
    url = "https://github.com/kevinalliswell"
  [[params.socialIcons]]
    name = "email"
    url = "mailto:kevin.alliswell@gmail.com"
  [[params.socialIcons]]
    name = "rss"
    url = "index.xml"

[outputs]
  home = ["HTML", "RSS"]
  section = ["HTML", "RSS"]
  taxonomy = ["HTML"]
  term = ["HTML"]

[privacy]
  [privacy.disqus]
    disable = true
  [privacy.googleAnalytics]
    disable = true
  [privacy.instagram]
    disable = true
  [privacy.x]
    disable = true
  [privacy.vimeo]
    disable = true
  [privacy.youtube]
    disable = true