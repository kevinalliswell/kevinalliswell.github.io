baseURL = 'https://kevinalliswell.github.io/'
languageCode = 'zh-cn'
title = "Kevin's Blog"
theme = 'stack'

defaultContentLanguage = "zh"
hasCJKLanguage = true

[pagination]
  pagerSize = 10

[outputs]
  home    = ["HTML", "RSS"]
  section = ["HTML", "RSS"]
  taxonomy = ["HTML"]
  term     = ["HTML"]

[menu]
  [[menu.main]]
    identifier = "home"
    name       = "首页"
    url        = "/"
    weight     = 1
    [menu.main.params]
      icon = "home"

  [[menu.main]]
    identifier = "posts"
    name       = "文章"
    url        = "/posts/"
    weight     = 2
    [menu.main.params]
      icon = "archives"

  [[menu.main]]
    identifier = "archives"
    name       = "归档"
    url        = "/archives/"
    weight     = 3
    [menu.main.params]
      icon = "archives"

  [[menu.main]]
    identifier = "search"
    name       = "搜索"
    url        = "/search/"
    weight     = 4
    [menu.main.params]
      icon = "search"

  [[menu.main]]
    identifier = "about"
    name       = "关于"
    url        = "/about/"
    weight     = 5
    [menu.main.params]
      icon = "user"

  [[menu.social]]
    identifier = "github"
    name       = "GitHub"
    url        = "https://github.com/kevinalliswell"
    weight     = 1
    [menu.social.params]
      icon = "brand-github"

  [[menu.social]]
    identifier = "email"
    name       = "Email"
    url        = "mailto:kevin.alliswell@gmail.com"
    weight     = 2
    [menu.social.params]
      icon = "mail"

  [[menu.social]]
    identifier = "rss"
    name       = "RSS"
    url        = "/posts/index.xml"
    weight     = 3
    [menu.social.params]
      icon = "rss"

[params]
  author       = "Kevin"
  mainSections = ["posts"]

  [params.sidebar]
    compact  = false
    subtitle = "这里是我的数字花园，记录工作笔记、热点观察与生活随笔。"
    avatar   = ""

  [params.footer]
    since      = 2026
    customText = ""

  [params.dateFormat]
    published   = "2006-01-02"
    lastUpdated = "2006-01-02"

  [params.article]
    headingAnchor = true
    math          = false
    toc           = true
    readingTime   = true

    [params.article.list]
      showTags = true

    [params.article.license]
      enabled = false

  [params.widgets]
    homepage = [
      {type = "search"},
      {type = "archives", params = {limit = 5}},
      {type = "categories"},
      {type = "tag-cloud"},
    ]
    page = [
      {type = "toc"},
    ]

  [params.colorScheme]
    toggle  = true
    default = "auto"

  [params.imageProcessing]
    autoOrient = false
    [params.imageProcessing.content]
      enabled = true
      widths  = [800, 1600, 2400]
    [params.imageProcessing.thumbnail]
      enabled = true

  [params.comments]
    enabled = false

  [params.cookies]
    enabled = false

[privacy]
  [privacy.disqus]
    disable = true
  [privacy.googleAnalytics]
    disable = true
  [privacy.instagram]
    disable = true
  [privacy.x]
    disable = true
  [privacy.vimeo]
    disable = true
  [privacy.youtube]
    disable = true
